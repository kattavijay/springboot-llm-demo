# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────
# Spring AI – OpenAI
# Set OPENAI_API_KEY in your environment, or
# swap to spring.ai.azure.openai.* for Azure
# ─────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:your-key-here}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=text-embedding-3-small

# ─────────────────────────────────────────
# Data Source (H2 in-memory for demo;
# swap to PostgreSQL + pgvector in prod)
# ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:llmdemo;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─────────────────────────────────────────
# Actuator / Monitoring
# ─────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging.level.com.demo=DEBUG
logging.level.org.springframework.ai=INFO
